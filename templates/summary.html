{% extends "base.html" %}
{% block content %}
<div class="page-header mb-4">
    <h2><i class="bi bi-bar-chart"></i> Summary</h2>
</div>

<div class="row mb-4">
    <div class="col-md-3 col-sm-6 mb-3">
        <div class="card-body total-expenses">
            <h6>Total Expenses</h6>
            <h3 id="totalExpenses">₹0.00</h3>
        </div>
    </div>
    <div class="col-md-3 col-sm-6 mb-3">
        <div class="card-body total-entries">
            <h6>Total Entries</h6>
            <h3 id="totalCount">0</h3>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mb-3">
        <div class="card">
            <div class="card-header"><h5>Spending by Category</h5></div>
            <div class="card-body">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-6 mb-3">
        <div class="card">
            <div class="card-header"><h5>Monthly Spending</h5></div>
            <div class="card-body">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% endblock %}
