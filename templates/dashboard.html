{% extends "base.html" %}
{% block content %}
<div class="page-header mb-4">
    <h2><i class="bi bi-speedometer2"></i> Dashboard</h2>
</div>

<div class="card">
    <div class="card-header"><h5>Filter Expenses</h5></div>
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-3 mb-2">
                <label class="form-label">Category</label>
                <select id="filterCategory" class="form-select">
                    <option value="all">All Categories</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label">Start Date</label>
                <input type="date" id="filterStartDate" class="form-control">
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label">End Date</label>
                <input type="date" id="filterEndDate" class="form-control">
            </div>
            <div class="col-md-3 d-flex align-items-end mb-2">
                <button id="applyFilter" class="btn btn-secondary w-100">Apply Filter</button>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-3 col-sm-6 mb-2">
                <div class="card-body total-expenses">
                    <h6>Total Expenses</h6>
                    <h3 id="totalExpenses">₹0.00</h3>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-2">
                <div class="card-body total-entries">
                    <h6>Total Entries</h6>
                    <h3 id="totalCount">0</h3>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="expenseTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Expense Modal -->
<div class="modal fade" id="editExpenseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editExpenseForm">
                    <input type="hidden" id="editExpenseId">
                    <div class="mb-3">
                        <label class="form-label">Amount *</label>
                        <input type="number" step="0.01" class="form-control" id="editExpenseAmount" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category *</label>
                        <select class="form-select" id="editExpenseCategory" required>
                            <option value="">Select Category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <input type="text" class="form-control" id="editExpenseDescription">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date *</label>
                        <input type="date" class="form-control" id="editExpenseDate" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="updateExpense">Update Expense</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% endblock %}
